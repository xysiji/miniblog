version: '3.8'
services:
  mysql:
    image: mysql:8.0
    container_name: miniblog-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: miniblog_user
    ports:
      - "3306:3306"
    volumes:
      - ./mysql/data:/var/lib/mysql

  redis:
    image: redis:7.0-alpine
    container_name: miniblog-redis
    ports:
      - "6379:6379"
    volumes:
      - ./redis/data:/data