syntax = "proto3";

package interaction;
option go_package = "./interaction";

// --- 点赞相关 ---
message LikeRequest {
  int64 user_id = 1;
  int64 post_id = 2;
}
message LikeResponse {}

// --- 评论相关 ---
message CommentRequest {
  int64 user_id = 1;
  int64 post_id = 2;
  string content = 3;
}
message CommentResponse {
  int64 comment_id = 1; // 返回生成的评论ID
}

// 互动服务
service Interaction {
  // 点赞/取消点赞
  rpc Like(LikeRequest) returns(LikeResponse);
  // 发表评论
  rpc Comment(CommentRequest) returns(CommentResponse);
}