syntax = "proto3";

package interaction;
option go_package = "./interaction";

message LikeRequest {
  int64 user_id = 1;
  int64 post_id = 2;
}
message LikeResponse {}

message UnlikeRequest {
  int64 user_id = 1;
  int64 post_id = 2;
}
message UnlikeResponse {}

message CommentRequest {
  int64 user_id = 1;
  int64 post_id = 2;
  string content = 3;
  int64 root_id = 4;
  int64 parent_id = 5;
  int64 reply_to_user_id = 6;
}
message CommentResponse {
  int64 comment_id = 1;
}

message CommentDeleteRequest {
  int64 user_id = 1;
  int64 comment_id = 2;
  int64 post_id = 3; // 核心：增加分表路由参数
}
message CommentDeleteResponse {}

message CommentItem {
  int64 id = 1;
  int64 post_id = 2;
  int64 user_id = 3;
  string content = 4;
  int64 create_time = 5;
  int64 root_id = 6;
  int64 parent_id = 7;
  int64 reply_to_user_id = 8;
}

message CommentListRequest {
  int64 post_id = 1;
  int64 page = 2;
  int64 page_size = 3;
}
message CommentListResponse {
  repeated CommentItem list = 1;
  int64 total = 2;
}

message LikedListRequest {
  int64 user_id = 1;
}
message LikedListResponse {
  repeated int64 post_ids = 1;
}

service Interaction {
  rpc Like(LikeRequest) returns(LikeResponse);
  rpc Unlike(UnlikeRequest) returns(UnlikeResponse);
  rpc Comment(CommentRequest) returns(CommentResponse);
  rpc CommentDelete(CommentDeleteRequest) returns(CommentDeleteResponse);
  rpc CommentList(CommentListRequest) returns(CommentListResponse);
  rpc LikedList(LikedListRequest) returns(LikedListResponse);
}