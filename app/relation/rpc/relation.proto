syntax = "proto3";

package relation;
option go_package = "./relation";

message FollowReq {
  int64 follower_id = 1;  // 谁在关注
  int64 following_id = 2; // 关注了谁
}
message FollowResp {}

message UnfollowReq {
  int64 follower_id = 1;
  int64 following_id = 2;
}
message UnfollowResp {}

// 为了个人主页聚合 (选项C) 准备的核心接口：查询关注数和粉丝数
message RelationCountReq {
  int64 target_user_id = 1;
}
message RelationCountResp {
  int64 following_count = 1; // 关注了多少人
  int64 follower_count = 2;  // 有多少粉丝
}

// 检查是否已关注 (供前端按钮高亮使用)
message CheckIsFollowReq {
  int64 current_user_id = 1;
  int64 target_user_id = 2;
}
message CheckIsFollowResp {
  bool is_follow = 1;
}

service Relation {
  rpc Follow(FollowReq) returns(FollowResp);
  rpc Unfollow(UnfollowReq) returns(UnfollowResp);
  rpc GetRelationCount(RelationCountReq) returns(RelationCountResp);
  rpc CheckIsFollow(CheckIsFollowReq) returns(CheckIsFollowResp);
}