Name: notice-api
Host: 0.0.0.0
Port: 8891 # 分配 8891 端口给前端调用的通知接口
# 严格对齐 JWT 密钥，确保能解析 User 服务发的 Token
Auth:
  AccessSecret: u7x9A2f8P5vQ3mR1wT6kY4zL0bC9eD2h
  AccessExpire: 86400

# 【保留】：未来写操作（如标记已读）依然需要调用底层 RPC
NoticeRpc:
  Endpoints:
    - 127.0.0.1:8083
# 【新增】：让 API 网关也能直连数据库读取通知列表
DataSource: root:root@tcp(127.0.0.1:3306)/miniblog_db?charset=utf8mb4&parseTime=True&loc=Local
CacheRedis:
  - Host: 127.0.0.1:6379
    Pass: ""