syntax = "proto3";

package user;
option go_package = "./user";

message RegisterRequest {
  string username = 1;
  string password = 2;
}

message RegisterResponse {
  int64 user_id = 1;
}

message LoginRequest {
  string username = 1;
  string password = 2;
}

message LoginResponse {
  int64 user_id = 1;
}

message UserInfoRequest {
  int64 user_id = 1;
}

message UserInfoResponse {
  int64 user_id = 1;
  string username = 2;
  string avatar = 3;
  string bio = 4;
}

// ============== 【核心新增】批量获取用户信息 ==============
message BatchUserInfoReq {
  repeated int64 user_ids = 1;
}

message BatchUserInfoResp {
  map<int64, UserInfoResponse> users = 1;
}
// =========================================================

message UserUpdateRequest {
  int64 user_id = 1;
  string avatar = 2;
  string bio = 3;
}

message UserUpdateResponse {
}

service User {
  rpc Register(RegisterRequest) returns(RegisterResponse);
  rpc Login(LoginRequest) returns(LoginResponse);
  rpc UserInfo(UserInfoRequest) returns(UserInfoResponse);
  rpc UserUpdate(UserUpdateRequest) returns(UserUpdateResponse);
  // 【新增】批量查询 RPC 方法
  rpc BatchGetUserInfo(BatchUserInfoReq) returns(BatchUserInfoResp);
}