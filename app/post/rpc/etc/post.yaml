Name: post.rpc
ListenOn: 0.0.0.0:8081
# 数据库与缓存配置
DataSource: root:root@tcp(127.0.0.1:3306)/miniblog_db?charset=utf8mb4&parseTime=True&loc=Local
CacheRedis:
  - Host: 127.0.0.1:6379
    Pass: ""
# 新增：这是给我们的业务逻辑层 (BizLogic) 专门独立使用的 Redis
BizRedis:
  Host: 127.0.0.1:6379
  Type: node
  Pass: ""
