
Name: post.rpc
ListenOn: 0.0.0.0:8081

# 【分布式存储架构配置区】
# 1. MySQL 主从读写分离节点 (开发环境暂指本地同一库模拟，生产环境改为不同IP集群)
MasterDataSource: root:root@tcp(127.0.0.1:3306)/miniblog_db?charset=utf8mb4&parseTime=True&loc=Local
SlaveDataSource: root:root@tcp(127.0.0.1:3306)/miniblog_db?charset=utf8mb4&parseTime=True&loc=Local

# 2. Redis 多级缓存节点
CacheRedis:
  - Host: 127.0.0.1:6379
    Pass: ""
BizRedis:
  Host: 127.0.0.1:6379
  Pass: ""
  Type: node
